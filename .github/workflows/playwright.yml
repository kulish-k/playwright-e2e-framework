name: Playwright Enterprise Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers & OS Dependencies
      run: npx playwright install --with-deps
      
    - name: Run E2E & API test suites
      # Tags or environments can easily be injected here (npm run test:staging)
      run: npx playwright test
      
    - name: Upload Playwright HTML Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

    - name: Upload JUnit Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: junit-report
        path: test-results/
        retention-days: 14

    - name: Upload Allure Results for Dashboarding
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: allure-results
        path: allure-results/
        retention-days: 14
